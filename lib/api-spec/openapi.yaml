openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: API specification for Workforce Analytics & IT Management
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Admin authentication
  - name: devices
    description: Device management and IT commands
  - name: activity
    description: Activity logs
  - name: screenshots
    description: Screenshot gallery
  - name: reports
    description: Dashboard reports
  - name: attendance
    description: Attendance tracking
  - name: categories
    description: App productivity classification
  - name: tokens
    description: Enrollment tokens
  - name: users
    description: User directory
  - name: sync
    description: Device agent synchronization
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Exchange credentials for a session cookie
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Revoke the current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                required: [ok]
  /auth/me:
    get:
      operationId: getCurrentUser
      tags: [auth]
      summary: Return the current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /devices:
    get:
      operationId: listDevices
      tags: [devices]
      summary: List enrolled devices
      responses:
        "200":
          description: Devices
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceItem"
  /devices/{id}:
    get:
      operationId: getDevice
      tags: [devices]
      summary: Get a device
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceItem"
  /devices/{id}/commands:
    get:
      operationId: getDeviceCommands
      tags: [devices]
      summary: Get command history for a device
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Commands
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/DeviceCommandItem"
    post:
      operationId: issueDeviceCommand
      tags: [devices]
      summary: Issue an authorized IT command
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IssueCommandRequest"
      responses:
        "201":
          description: Command issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceCommandItem"

  /devices/{id}/group:
    patch:
      operationId: setDeviceGroup
      tags: [devices]
      summary: Assign a device to a group
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceGroupInput"
      responses:
        "200":
          description: Updated device
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceItem"
  /devices/groups/rename:
    post:
      operationId: renameDeviceGroup
      tags: [devices]
      summary: Rename a device group across all devices
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GroupRenameInput"
      responses:
        "200":
          description: Rename result
          content:
            application/json:
              schema:
                type: object
                properties:
                  renamed:
                    type: integer
                required: [renamed]

  /activity:
    get:
      operationId: getActivityLogs
      tags: [activity]
      summary: Get activity logs
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: userId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: group
          in: query
          required: false
          description: Restrict to devices in this group
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Activity logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogRecord"
  /activity/timeline:
    get:
      operationId: getTimeline
      tags: [activity]
      summary: Get timeline view
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Timeline events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityLogRecord"

  /screenshots:
    get:
      operationId: listScreenshots
      tags: [screenshots]
      summary: List screenshot metadata
      parameters:
        - name: deviceId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: flagged
          in: query
          required: false
          schema:
            type: boolean
        - name: group
          in: query
          required: false
          description: Restrict to devices in this group
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: Screenshots
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScreenshotListItem"
  /screenshots/{id}/flag:
    patch:
      operationId: flagScreenshot
      tags: [screenshots]
      summary: Flag or unflag a screenshot
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScreenshotFlagInput"
      responses:
        "200":
          description: Updated flag state
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  flagged:
                    type: boolean
                required: [id, flagged]

  /reports/summary:
    get:
      operationId: getSummary
      tags: [reports]
      summary: Dashboard overview KPIs
      parameters:
        - name: group
          in: query
          required: false
          description: Restrict aggregation to devices in this group
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: Range start day in YYYY-MM-DD format (inclusive); defaults to today
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: Range end day in YYYY-MM-DD format (inclusive); defaults to today
      responses:
        "200":
          description: Summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryResponse"
  /reports/leaderboard:
    get:
      operationId: getLeaderboard
      tags: [reports]
      summary: Per-device productivity over a date range
      parameters:
        - name: group
          in: query
          required: false
          description: Restrict aggregation to devices in this group
          schema:
            type: string
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: Range start day in YYYY-MM-DD format (inclusive); defaults to today
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: Range end day in YYYY-MM-DD format (inclusive); defaults to today
      responses:
        "200":
          description: Leaderboard
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LeaderboardItem"
  /reports/group-comparison:
    get:
      operationId: getGroupComparison
      tags: [reports]
      summary: Per-group productivity comparison over a date range
      parameters:
        - name: from
          in: query
          required: false
          schema:
            type: string
            description: Range start day in YYYY-MM-DD format (inclusive); defaults to today
        - name: to
          in: query
          required: false
          schema:
            type: string
            description: Range end day in YYYY-MM-DD format (inclusive); defaults to today
      responses:
        "200":
          description: Group comparison
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/GroupComparisonItem"

  /attendance/settings:
    get:
      operationId: getAttendanceSettings
      tags: [attendance]
      summary: Get global attendance rules
      responses:
        "200":
          description: Attendance settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSettingsItem"
    put:
      operationId: updateAttendanceSettings
      tags: [attendance]
      summary: Update global attendance rules
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttendanceSettingsUpdate"
      responses:
        "200":
          description: Updated attendance settings
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceSettingsItem"
  /attendance:
    get:
      operationId: getAttendanceReport
      tags: [attendance]
      summary: Per-device daily attendance report
      parameters:
        - name: date
          in: query
          required: false
          schema:
            type: string
            description: Day in YYYY-MM-DD format; defaults to today
        - name: group
          in: query
          required: false
          description: Restrict to devices in this group
          schema:
            type: string
      responses:
        "200":
          description: Attendance report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceReport"
  /attendance/range:
    get:
      operationId: getAttendanceRangeReport
      tags: [attendance]
      summary: Per-device attendance summary across a date range
      parameters:
        - name: from
          in: query
          required: true
          schema:
            type: string
            description: Range start day in YYYY-MM-DD format (inclusive)
        - name: to
          in: query
          required: true
          schema:
            type: string
            description: Range end day in YYYY-MM-DD format (inclusive)
        - name: group
          in: query
          required: false
          description: Restrict to devices in this group
          schema:
            type: string
      responses:
        "200":
          description: Attendance range report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttendanceRangeReport"

  /categories:
    get:
      operationId: listCategories
      tags: [categories]
      summary: List app classification rules
      responses:
        "200":
          description: Categories
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CategoryItem"
  /categories/{id}:
    patch:
      operationId: updateCategory
      tags: [categories]
      summary: Classify or rename an app category
      parameters:
        - $ref: "#/components/parameters/IdParam"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateCategoryRequest"
      responses:
        "200":
          description: Updated category
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CategoryItem"

  /tokens:
    get:
      operationId: listTokens
      tags: [tokens]
      summary: List enrollment tokens
      responses:
        "200":
          description: Tokens
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/EnrollmentTokenItem"
    post:
      operationId: createToken
      tags: [tokens]
      summary: Mint a new enrollment token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTokenRequest"
      responses:
        "201":
          description: Token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentTokenItem"
  /tokens/{id}/revoke:
    post:
      operationId: revokeToken
      tags: [tokens]
      summary: Revoke an enrollment token
      parameters:
        - $ref: "#/components/parameters/IdParam"
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrollmentTokenItem"

  /users:
    get:
      operationId: listUsers
      tags: [users]
      summary: List users
      responses:
        "200":
          description: Users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AuthUser"

  /sync/heartbeat:
    post:
      operationId: heartbeat
      tags: [sync]
      summary: Node reports status and pulls configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HeartbeatRequest"
      responses:
        "200":
          description: Successful heartbeat
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HeartbeatResponse"
  /sync/activity:
    post:
      operationId: syncActivity
      tags: [sync]
      summary: Batch upload of activity logs and media
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SyncActivityRequest"
      responses:
        "200":
          description: Sync successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string

components:
  parameters:
    IdParam:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
  schemas:
    LoginRequest:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]
    AuthUser:
      type: object
      properties:
        id:
          type: string
          format: uuid
        username:
          type: string
        email:
          type: string
        role:
          type: string
          enum: [super_user, admin, team_member]
        createdAt:
          type: string
          format: date-time
      required: [id, username, email, role, createdAt]
    DeviceItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        hardwareHash:
          type: string
        systemName:
          type: string
        osType:
          type: string
          enum: [windows, macos, linux]
        agentVersion:
          type: [string, "null"]
        assignedUserId:
          type: [string, "null"]
          format: uuid
        consentAcknowledgedAt:
          type: [string, "null"]
          format: date-time
        consentName:
          type: [string, "null"]
        enrolledAt:
          type: [string, "null"]
          format: date-time
        lastSeenAt:
          type: [string, "null"]
          format: date-time
        isLocked:
          type: boolean
        screenshotMinMinutes:
          type: integer
        screenshotMaxMinutes:
          type: integer
        idleThresholdSeconds:
          type: integer
        syncIntervalSeconds:
          type: integer
        monitoringEnabled:
          type: boolean
        deviceGroup:
          type: string
        online:
          type: boolean
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - hardwareHash
        - systemName
        - osType
        - isLocked
        - screenshotMinMinutes
        - screenshotMaxMinutes
        - idleThresholdSeconds
        - syncIntervalSeconds
        - monitoringEnabled
        - deviceGroup
        - online
        - createdAt
        - updatedAt
    DeviceGroupInput:
      type: object
      properties:
        deviceGroup:
          type: string
          minLength: 1
      required: [deviceGroup]
    GroupRenameInput:
      type: object
      properties:
        from:
          type: string
          minLength: 1
        to:
          type: string
          minLength: 1
      required: [from, to]
    DeviceCommandItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        issuedById:
          type: [string, "null"]
          format: uuid
        commandType:
          type: string
          enum: [lock_screen, logout_user, update_config]
        payload:
          type: [string, "null"]
        status:
          type: string
          enum: [pending, acknowledged, completed, failed, cancelled]
        reason:
          type: [string, "null"]
        issuedAt:
          type: string
          format: date-time
        acknowledgedAt:
          type: [string, "null"]
          format: date-time
        completedAt:
          type: [string, "null"]
          format: date-time
      required: [id, deviceId, commandType, status, issuedAt]
    IssueCommandRequest:
      type: object
      properties:
        commandType:
          type: string
          enum: [lock_screen, logout_user]
        reason:
          type: string
      required: [commandType]
    ActivityLogRecord:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        userId:
          type: [string, "null"]
          format: uuid
        processName:
          type: string
        windowTitle:
          type: [string, "null"]
        categoryId:
          type: [string, "null"]
          format: uuid
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
        durationSeconds:
          type: integer
        idleSeconds:
          type: integer
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - deviceId
        - processName
        - startedAt
        - endedAt
        - durationSeconds
        - idleSeconds
        - createdAt
    ScreenshotListItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceId:
          type: string
          format: uuid
        userId:
          type: [string, "null"]
          format: uuid
        fileSizeBytes:
          type: integer
        flagged:
          type: boolean
        capturedAt:
          type: string
          format: date-time
        imageUrl:
          type: string
      required: [id, deviceId, fileSizeBytes, flagged, capturedAt, imageUrl]
    ScreenshotFlagInput:
      type: object
      properties:
        flagged:
          type: boolean
      required: [flagged]
    SummaryResponse:
      type: object
      properties:
        devices:
          type: object
          properties:
            total:
              type: integer
            online:
              type: integer
          required: [total, online]
        usersCount:
          type: integer
        screenshotsToday:
          type: integer
        pendingCommands:
          type: integer
        activityToday:
          type: object
          properties:
            productiveSeconds:
              type: integer
            unproductiveSeconds:
              type: integer
            neutralSeconds:
              type: integer
            undefinedSeconds:
              type: integer
            totalSeconds:
              type: integer
          required:
            - productiveSeconds
            - unproductiveSeconds
            - neutralSeconds
            - undefinedSeconds
            - totalSeconds
      required:
        - devices
        - usersCount
        - screenshotsToday
        - pendingCommands
        - activityToday
    LeaderboardItem:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        systemName:
          type: string
        productiveSeconds:
          type: integer
        totalSeconds:
          type: integer
        score:
          type: integer
      required: [deviceId, systemName, productiveSeconds, totalSeconds, score]
    GroupComparisonItem:
      type: object
      properties:
        group:
          type: string
        deviceCount:
          type: integer
        productiveSeconds:
          type: integer
        totalSeconds:
          type: integer
        score:
          type: integer
      required: [group, deviceCount, productiveSeconds, totalSeconds, score]
    CategoryItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        pattern:
          type: string
        displayName:
          type: string
        classification:
          type: string
          enum: [productive, unproductive, neutral, undefined]
        createdById:
          type: [string, "null"]
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, pattern, displayName, classification, createdAt, updatedAt]
    UpdateCategoryRequest:
      type: object
      properties:
        classification:
          type: string
          enum: [productive, unproductive, neutral, undefined]
        displayName:
          type: string
    AttendanceSettingsItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deviceId:
          type: [string, "null"]
          format: uuid
        workStartTime:
          type: string
        halfDayThresholdHours:
          type: number
        requiredHoursNormal:
          type: number
        requiredHoursFriday:
          type: number
        workingDays:
          type: array
          description: Working weekdays, 0=Sunday .. 6=Saturday.
          items:
            type: integer
        holidays:
          type: array
          description: Company holidays as YYYY-MM-DD strings.
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - id
        - workStartTime
        - halfDayThresholdHours
        - requiredHoursNormal
        - requiredHoursFriday
        - workingDays
        - holidays
    AttendanceSettingsUpdate:
      type: object
      properties:
        workStartTime:
          type: string
        halfDayThresholdHours:
          type: number
        requiredHoursNormal:
          type: number
        requiredHoursFriday:
          type: number
        workingDays:
          type: array
          description: Working weekdays, 0=Sunday .. 6=Saturday.
          items:
            type: integer
        holidays:
          type: array
          description: Company holidays as YYYY-MM-DD strings.
          items:
            type: string
      required:
        - workStartTime
        - halfDayThresholdHours
        - requiredHoursNormal
        - requiredHoursFriday
    AttendanceRow:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        systemName:
          type: string
        deviceGroup:
          type: string
        checkIn:
          type: [string, "null"]
          format: date-time
        lastActivity:
          type: [string, "null"]
          format: date-time
        workedSeconds:
          type: integer
        idleSeconds:
          type: integer
        requiredHours:
          type: number
        status:
          type: string
          enum: [present, half_day, absent, non_working]
      required:
        - deviceId
        - systemName
        - deviceGroup
        - workedSeconds
        - idleSeconds
        - requiredHours
        - status
    AttendanceReport:
      type: object
      properties:
        date:
          type: string
        isFriday:
          type: boolean
        isWorkingDay:
          type: boolean
        requiredHours:
          type: number
        devices:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRow"
      required: [date, isFriday, isWorkingDay, requiredHours, devices]
    AttendanceRangeRow:
      type: object
      properties:
        deviceId:
          type: string
          format: uuid
        systemName:
          type: string
        deviceGroup:
          type: string
        presentDays:
          type: integer
        halfDays:
          type: integer
        absentDays:
          type: integer
        totalWorkedSeconds:
          type: integer
        avgWorkedSeconds:
          type: integer
      required:
        - deviceId
        - systemName
        - deviceGroup
        - presentDays
        - halfDays
        - absentDays
        - totalWorkedSeconds
        - avgWorkedSeconds
    AttendanceRangeDayDevice:
      type: object
      description: One device's worked time and status for a single day.
      properties:
        deviceId:
          type: string
          format: uuid
        workedSeconds:
          type: integer
        status:
          type: string
          enum: [present, half_day, absent]
      required:
        - deviceId
        - workedSeconds
        - status
    AttendanceRangeDay:
      type: object
      properties:
        day:
          type: string
          description: Day in YYYY-MM-DD format
        isWorkingDay:
          type: boolean
          description: False for weekends/holidays, which are excluded from device classification
        workedSeconds:
          type: integer
          description: Total worked seconds across all devices that day
        presentDevices:
          type: integer
        halfDayDevices:
          type: integer
        absentDevices:
          type: integer
        byDevice:
          type: array
          description: Per-device worked seconds and status for this day.
          items:
            $ref: "#/components/schemas/AttendanceRangeDayDevice"
      required:
        - day
        - isWorkingDay
        - workedSeconds
        - presentDevices
        - halfDayDevices
        - absentDevices
        - byDevice
    AttendanceRangeReport:
      type: object
      properties:
        from:
          type: string
        to:
          type: string
        days:
          type: integer
        workingDays:
          type: integer
        devices:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRangeRow"
        daily:
          type: array
          items:
            $ref: "#/components/schemas/AttendanceRangeDay"
      required: [from, to, days, workingDays, devices, daily]
    EnrollmentTokenItem:
