name: Build Agent Installers

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create/publish (e.g. agent-v0.1.0)"
        required: true
        default: "agent-v0.1.0"

permissions:
  contents: write

# ── Opt into Node.js 24 now (required after June 16 2026) ─────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    steps:
      # actions/checkout v4.2+ ships Node.js 24 support
      - uses: actions/checkout@v4.2.2
        with:
          # Fetch full history so git tag operations work correctly
          fetch-depth: 0

      # actions/setup-python v5.3+ supports Node.js 24 runner
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: 'pip' # Enable automatic pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt pyinstaller

      - name: Generate icons
        run: python agent/packaging/make_icons.py

      - name: Build system service agent executable
        working-directory: agent/packaging
        run: pyinstaller --noconfirm WorkforceAgent-SystemService.spec

      - name: Build system service installer (Inno Setup)
        working-directory: agent/packaging
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\WorkforceAgent-SystemService.iss

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: SVCTCOM-installer
          path: agent/packaging/dist/SVCTCOM-Setup.exe

      # Only publish a GitHub Release when this job was triggered by a real tag
      - name: Publish system service to release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/SVCTCOM-Setup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"
          cache: 'pip' # Enable automatic pip caching

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt pyinstaller

      - name: Generate icons
        run: python agent/packaging/make_icons.py

      - name: Install build dependencies
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew install create-dmg

      - name: Build system service .app and .dmg
        run: |
          chmod +x agent/packaging/macos/build_dmg_system_service.sh
          bash agent/packaging/macos/build_dmg_system_service.sh

      - uses: actions/upload-artifact@v4.4.3
        with:
          name: svctcom-installer
          path: agent/packaging/dist/svctcom.dmg

      - name: Publish system service to release
        if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.event.inputs.version || github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/svctcom.dmg
