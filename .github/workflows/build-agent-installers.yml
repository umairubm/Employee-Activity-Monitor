name: Build Agent Installers

on:
  push:
    tags:
      - "agent-v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release tag to create/publish (e.g. agent-v0.1.0)"
        required: true
        default: "agent-v0.1.0"
      build_type:
        description: "Build type: transparent (UI+tray), stealth (headless), invisible (service), or all"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - transparent
          - stealth
          - invisible

permissions:
  contents: write

# ── Opt into Node.js 24 now (required after June 16 2026) ─────────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  windows:
    runs-on: windows-latest
    strategy:
      matrix:
        variant: ${{ fromJSON(github.event.inputs.build_type == 'transparent' && '["transparent"]' || github.event.inputs.build_type == 'stealth' && '["stealth"]' || github.event.inputs.build_type == 'invisible' && '["invisible"]' || '["transparent", "stealth", "invisible"]') }}
    steps:
      # actions/checkout v4.2+ ships Node.js 24 support
      - uses: actions/checkout@v4.2.2
        with:
          # Fetch full history so git tag operations work correctly
          fetch-depth: 0

      # actions/setup-python v5.3+ supports Node.js 24 runner
      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt pyinstaller

      - name: Generate icons
        run: python agent/packaging/make_icons.py

      - name: Build transparent agent executable
        if: matrix.variant == 'transparent'
        working-directory: agent/packaging
        run: pyinstaller --noconfirm WorkforceAgent.spec

      - name: Build stealth agent executable
        if: matrix.variant == 'stealth'
        working-directory: agent/packaging
        run: pyinstaller --noconfirm WorkforceAgent-Stealth.spec

      - name: Build invisible agent executable
        if: matrix.variant == 'invisible'
        working-directory: agent/packaging
        run: pyinstaller --noconfirm WorkforceAgent-Invisible.spec

      - name: Build transparent installer (Inno Setup)
        if: matrix.variant == 'transparent'
        working-directory: agent/packaging
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\WorkforceAgent.iss

      - name: Build stealth installer (Inno Setup)
        if: matrix.variant == 'stealth'
        working-directory: agent/packaging
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\WorkforceAgent-Stealth.iss

      - name: Build invisible installer (Inno Setup)
        if: matrix.variant == 'invisible'
        working-directory: agent/packaging
        run: |
          choco install innosetup -y --no-progress
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" windows\WorkforceAgent-Invisible.iss

      # actions/upload-artifact v4.4+ supports Node.js 24
      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'transparent'
        with:
          name: windows-installer-transparent
          path: agent/packaging/dist/WorkforceAgent-Setup-windows.exe

      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'stealth'
        with:
          name: windows-installer-stealth
          path: agent/packaging/dist/WorkforceAgent-Setup-Stealth-windows.exe

      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'invisible'
        with:
          name: windows-installer-invisible
          path: agent/packaging/dist/WorkforceAgent-Setup-Invisible-windows.exe

      # Only publish a GitHub Release when this job was triggered by a real tag
      - name: Publish transparent to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'transparent'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-Setup-windows.exe

      - name: Publish stealth to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'stealth'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-Setup-Stealth-windows.exe

      - name: Publish invisible to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'invisible'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-Setup-Invisible-windows.exe

  macos:
    runs-on: macos-latest
    strategy:
      matrix:
        variant: ${{ fromJSON(github.event.inputs.build_type == 'transparent' && '["transparent"]' || github.event.inputs.build_type == 'stealth' && '["stealth"]' || github.event.inputs.build_type == 'invisible' && '["invisible"]' || '["transparent", "stealth", "invisible"]') }}
    steps:
      - uses: actions/checkout@v4.2.2
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r agent/requirements.txt pyinstaller

      - name: Generate icons
        run: python agent/packaging/make_icons.py

      - name: Build transparent .app and .dmg
        if: matrix.variant == 'transparent'
        run: bash agent/packaging/macos/build_dmg.sh

      - name: Build stealth .app and .dmg
        if: matrix.variant == 'stealth'
        run: bash agent/packaging/macos/build_dmg_stealth.sh

      - name: Build invisible .app and .dmg
        if: matrix.variant == 'invisible'
        run: bash agent/packaging/macos/build_dmg_invisible.sh

      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'transparent'
        with:
          name: macos-installer-transparent
          path: agent/packaging/dist/WorkforceAgent-macos.dmg

      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'stealth'
        with:
          name: macos-installer-stealth
          path: agent/packaging/dist/WorkforceAgent-Stealth-macos.dmg

      - uses: actions/upload-artifact@v4.4.3
        if: matrix.variant == 'invisible'
        with:
          name: macos-installer-invisible
          path: agent/packaging/dist/WorkforceAgent-Invisible-macos.dmg

      - name: Publish transparent to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'transparent'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-macos.dmg

      - name: Publish stealth to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'stealth'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-Stealth-macos.dmg

      - name: Publish invisible to release
        if: startsWith(github.ref, 'refs/tags/') && matrix.variant == 'invisible'
        uses: softprops/action-gh-release@v2.2.1
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          fail_on_unmatched_files: false
          files: agent/packaging/dist/WorkforceAgent-Invisible-macos.dmg
